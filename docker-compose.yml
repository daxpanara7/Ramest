# Local development stack: Postgres + the NestJS backend.
# The frontend runs separately via `npm run dev` (it deploys to Vercel, not here).
#
#   docker compose up --build
#
# The API comes up on http://localhost:4000/api, Postgres on localhost:5432.

services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: root
      POSTGRES_DB: ramest_tech
    ports:
      - '5432:5432'
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U root -d ramest_tech']
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      NODE_ENV: production
      PORT: 4000
      DATABASE_URL: postgresql://root:root@db:5432/ramest_tech?schema=public
      CORS_ORIGINS: http://localhost:3000
      JWT_ACCESS_SECRET: local-dev-access-secret-change-me
      JWT_REFRESH_SECRET: local-dev-refresh-secret-change-me
    ports:
      - '4000:4000'

volumes:
  pgdata:
