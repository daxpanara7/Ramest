# Render blueprint. In the Render dashboard: New > Blueprint, point at this repo.
# Creates the API service + a managed Postgres, wired together automatically.
# You still set the secrets marked sync:false in the dashboard.

services:
  - type: web
    name: ramest-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    plan: free
    healthCheckPath: /api/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: ramest-postgres
          property: connectionString
      - key: CORS_ORIGINS
        value: https://www.ramesttechnolabs.com,http://localhost:3000
      # Set these in the dashboard (Environment tab) — never commit real secrets.
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: RESEND_API_KEY
        sync: false
      - key: RECAPTCHA_SECRET_KEY
        sync: false

databases:
  - name: ramest-postgres
    plan: free
    databaseName: ramest_tech
    user: ramest
